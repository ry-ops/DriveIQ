<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750">
  <defs>
    <!-- Gradients -->
    <linearGradient id="frontendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="backendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="redisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#DC2626"/>
    </linearGradient>
    <linearGradient id="qdrantGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#DB2777"/>
    </linearGradient>
    <linearGradient id="localLlmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#0891B2"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>

    <!-- Animated dash pattern -->
    <style>
      @keyframes dash {
        to { stroke-dashoffset: -30; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      .data-flow {
        stroke-dasharray: 10 5;
        animation: dash 1s linear infinite;
      }
      .pulse-box {
        animation: pulse 2s ease-in-out infinite;
      }
      .float-icon {
        animation: float 3s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="#0F172A"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#F8FAFC">DriveIQ Architecture</text>
  <text x="600" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94A3B8">RAG-Powered Vehicle Management System</text>

  <!-- User -->
  <g class="float-icon" style="animation-delay: 0s">
    <circle cx="100" cy="350" r="40" fill="#334155" stroke="#475569" stroke-width="2"/>
    <circle cx="100" cy="335" r="12" fill="#94A3B8"/>
    <path d="M75 365 Q100 385 125 365" stroke="#94A3B8" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text x="100" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8">User</text>
  </g>

  <!-- Frontend Box -->
  <g filter="url(#glow)">
    <rect x="200" y="230" width="180" height="240" rx="12" fill="url(#frontendGrad)" class="pulse-box" style="animation-delay: 0.2s"/>
  </g>
  <text x="290" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="white">Frontend</text>
  <text x="290" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#BFDBFE">React + TypeScript</text>
  <line x1="220" y1="300" x2="360" y2="300" stroke="#BFDBFE" stroke-opacity="0.3"/>
  <text x="230" y="320" font-family="system-ui, sans-serif" font-size="11" fill="#DBEAFE">Dashboard</text>
  <text x="230" y="340" font-family="system-ui, sans-serif" font-size="11" fill="#DBEAFE">MaintenanceCard</text>
  <text x="230" y="360" font-family="system-ui, sans-serif" font-size="11" fill="#DBEAFE">ChatWidget</text>
  <text x="230" y="380" font-family="system-ui, sans-serif" font-size="11" fill="#DBEAFE">Timeline View</text>
  <text x="230" y="400" font-family="system-ui, sans-serif" font-size="11" fill="#DBEAFE">Photo Gallery</text>
  <text x="230" y="420" font-family="system-ui, sans-serif" font-size="11" fill="#DBEAFE">Reindex Controls</text>
  <text x="230" y="440" font-family="system-ui, sans-serif" font-size="11" fill="#DBEAFE">Service Reminders</text>

  <!-- Backend Box -->
  <g filter="url(#glow)">
    <rect x="450" y="150" width="180" height="400" rx="12" fill="url(#backendGrad)" class="pulse-box" style="animation-delay: 0.4s"/>
  </g>
  <text x="540" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="white">Backend</text>
  <text x="540" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#A7F3D0">FastAPI + Python</text>
  <line x1="470" y1="220" x2="610" y2="220" stroke="#A7F3D0" stroke-opacity="0.3"/>
  <text x="480" y="240" font-family="system-ui, sans-serif" font-size="10" fill="#D1FAE5">/api/maintenance</text>
  <text x="480" y="258" font-family="system-ui, sans-serif" font-size="10" fill="#D1FAE5">/api/chat</text>
  <text x="480" y="276" font-family="system-ui, sans-serif" font-size="10" fill="#D1FAE5">/api/search</text>
  <text x="480" y="294" font-family="system-ui, sans-serif" font-size="10" fill="#D1FAE5">/api/uploads</text>
  <text x="480" y="312" font-family="system-ui, sans-serif" font-size="10" fill="#D1FAE5">/api/reminders</text>
  <text x="480" y="330" font-family="system-ui, sans-serif" font-size="10" fill="#D1FAE5">/api/moe</text>
  <line x1="470" y1="345" x2="610" y2="345" stroke="#A7F3D0" stroke-opacity="0.3"/>
  <text x="540" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#D1FAE5">Core Services</text>
  <text x="480" y="388" font-family="system-ui, sans-serif" font-size="10" fill="#D1FAE5">LLM Client</text>
  <text x="480" y="406" font-family="system-ui, sans-serif" font-size="10" fill="#D1FAE5">RAG Search</text>
  <text x="480" y="424" font-family="system-ui, sans-serif" font-size="10" fill="#D1FAE5">Document Ingestion</text>
  <text x="480" y="442" font-family="system-ui, sans-serif" font-size="10" fill="#D1FAE5">Embeddings</text>
  <text x="480" y="460" font-family="system-ui, sans-serif" font-size="10" fill="#D1FAE5">MoE Router</text>
  <text x="480" y="478" font-family="system-ui, sans-serif" font-size="10" fill="#D1FAE5">Maintenance Embed</text>
  <text x="480" y="496" font-family="system-ui, sans-serif" font-size="10" fill="#D1FAE5">Photo Management</text>
  <text x="480" y="514" font-family="system-ui, sans-serif" font-size="10" fill="#D1FAE5">CARFAX Import</text>

  <!-- PostgreSQL Box -->
  <g filter="url(#glow)">
    <rect x="700" y="100" width="170" height="155" rx="12" fill="url(#dbGrad)" class="pulse-box" style="animation-delay: 0.6s"/>
  </g>
  <text x="785" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="white">PostgreSQL</text>
  <text x="785" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#DDD6FE">+ pgvector</text>
  <line x1="720" y1="163" x2="850" y2="163" stroke="#DDD6FE" stroke-opacity="0.3"/>
  <text x="720" y="183" font-family="system-ui, sans-serif" font-size="10" fill="#EDE9FE">vehicles</text>
  <text x="720" y="198" font-family="system-ui, sans-serif" font-size="10" fill="#EDE9FE">maintenance_records</text>
  <text x="720" y="213" font-family="system-ui, sans-serif" font-size="10" fill="#EDE9FE">maintenance_logs</text>
  <text x="720" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#EDE9FE">document_chunks</text>
  <text x="720" y="243" font-family="system-ui, sans-serif" font-size="10" fill="#EDE9FE">reminders</text>

  <!-- Qdrant Box -->
  <g filter="url(#glow)">
    <rect x="700" y="280" width="170" height="100" rx="12" fill="url(#qdrantGrad)" class="pulse-box" style="animation-delay: 0.7s"/>
  </g>
  <text x="785" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="white">Qdrant</text>
  <text x="785" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FBCFE8">Vector Search</text>
  <line x1="720" y1="348" x2="850" y2="348" stroke="#FBCFE8" stroke-opacity="0.3"/>
  <text x="720" y="368" font-family="system-ui, sans-serif" font-size="10" fill="#FCE7F3">driveiq_docs</text>

  <!-- Redis Box -->
  <g filter="url(#glow)">
    <rect x="700" y="405" width="170" height="145" rx="12" fill="url(#redisGrad)" class="pulse-box" style="animation-delay: 0.8s"/>
  </g>
  <text x="785" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="white">Redis</text>
  <text x="785" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FECACA">Cache + Sessions</text>
  <line x1="720" y1="462" x2="850" y2="462" stroke="#FECACA" stroke-opacity="0.3"/>
  <text x="720" y="480" font-family="system-ui, sans-serif" font-size="10" fill="#FEE2E2">llm_responses</text>
  <text x="720" y="495" font-family="system-ui, sans-serif" font-size="10" fill="#FEE2E2">search_results</text>
  <text x="720" y="510" font-family="system-ui, sans-serif" font-size="10" fill="#FEE2E2">embeddings</text>
  <text x="720" y="525" font-family="system-ui, sans-serif" font-size="10" fill="#FEE2E2">chat_sessions</text>
  <text x="720" y="540" font-family="system-ui, sans-serif" font-size="10" fill="#FEE2E2">rate_limits</text>

  <!-- LLM Client Box (abstraction layer) -->
  <g filter="url(#glow)">
    <rect x="920" y="240" width="100" height="60" rx="10" fill="#334155" stroke="#475569" stroke-width="2"/>
  </g>
  <text x="970" y="267" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#94A3B8">LLM Client</text>
  <text x="970" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">llm_client.py</text>

  <!-- Claude AI Box -->
  <g filter="url(#glow)">
    <rect x="1050" y="150" width="130" height="120" rx="12" fill="url(#aiGrad)" class="pulse-box" style="animation-delay: 1s"/>
  </g>
  <text x="1115" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="white">Claude AI</text>
  <text x="1115" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FEF3C7">Anthropic API</text>
  <line x1="1065" y1="210" x2="1165" y2="210" stroke="#FEF3C7" stroke-opacity="0.3"/>
  <text x="1065" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#FEF9C3">Q&amp;A Responses</text>
  <text x="1065" y="243" font-family="system-ui, sans-serif" font-size="10" fill="#FEF9C3">RAG Context</text>
  <text x="1065" y="258" font-family="system-ui, sans-serif" font-size="10" fill="#FEF9C3">MoE Experts</text>

  <!-- Docker Model Runner Box -->
  <g filter="url(#glow)">
    <rect x="1050" y="310" width="130" height="120" rx="12" fill="url(#localLlmGrad)" class="pulse-box" style="animation-delay: 1.1s"/>
  </g>
  <text x="1115" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="white">Model Runner</text>
  <text x="1115" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#CFFAFE">Local LLM</text>
  <line x1="1065" y1="370" x2="1165" y2="370" stroke="#CFFAFE" stroke-opacity="0.3"/>
  <text x="1065" y="388" font-family="system-ui, sans-serif" font-size="10" fill="#ECFEFF">qwen3-coder</text>
  <text x="1065" y="403" font-family="system-ui, sans-serif" font-size="10" fill="#ECFEFF">glm-4.7-flash</text>
  <text x="1065" y="418" font-family="system-ui, sans-serif" font-size="10" fill="#ECFEFF">devstral-small-2</text>

  <!-- PDF Documents -->
  <g class="float-icon" style="animation-delay: 0.5s">
    <rect x="440" y="620" width="100" height="70" rx="8" fill="#334155" stroke="#475569" stroke-width="2"/>
    <text x="490" y="650" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#94A3B8">PDF</text>
    <text x="490" y="670" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">Manuals</text>
    <text x="490" y="710" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8">Documents</text>
  </g>

  <!-- Redis Insight -->
  <g class="float-icon" style="animation-delay: 1.2s">
    <rect x="700" y="575" width="170" height="45" rx="8" fill="#1E293B" stroke="#EF4444" stroke-width="1" stroke-opacity="0.4"/>
    <text x="785" y="603" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FECACA">Redis Insight :5540</text>
  </g>

  <!-- Data Flow Lines -->
  <!-- User to Frontend -->
  <path d="M140 350 L195 350" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)" class="data-flow"/>

  <!-- Frontend to Backend -->
  <path d="M380 350 L445 350" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)" class="data-flow"/>

  <!-- Backend to PostgreSQL -->
  <path d="M630 250 L695 190" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)" class="data-flow" style="animation-delay: 0.3s"/>

  <!-- Backend to Qdrant -->
  <path d="M630 330 L695 330" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)" class="data-flow" style="animation-delay: 0.4s"/>

  <!-- Backend to Redis -->
  <path d="M630 430 L695 470" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)" class="data-flow" style="animation-delay: 0.5s"/>

  <!-- Backend to LLM Client -->
  <path d="M630 270 L915 270" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)" class="data-flow" style="animation-delay: 0.6s"/>

  <!-- LLM Client to Claude -->
  <path d="M1020 255 L1045 210" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)" class="data-flow" style="animation-delay: 0.7s"/>

  <!-- LLM Client to Model Runner -->
  <path d="M1020 285 L1045 355" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)" class="data-flow" style="animation-delay: 0.8s"/>

  <!-- Documents to Backend -->
  <path d="M490 620 L540 555" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)" class="data-flow" style="animation-delay: 0.9s"/>

  <!-- Redis to Redis Insight -->
  <path d="M785 550 L785 572" stroke="#EF4444" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrowhead)"/>

  <!-- Labels for connections -->
  <text x="420" y="335" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">REST API</text>
  <text x="655" y="175" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">SQL</text>
  <text x="665" y="315" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">gRPC</text>
  <text x="655" y="455" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">Cache</text>
  <text x="770" y="260" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">RAG + MoE</text>
  <text x="510" y="600" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">Ingest</text>
  <text x="1030" y="195" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">Cloud</text>
  <text x="1030" y="345" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">Local</text>

  <!-- "or" label between Cloud/Local -->
  <text x="1040" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#64748B">or</text>

  <!-- Legend -->
  <rect x="30" y="620" width="150" height="100" rx="8" fill="#1E293B" stroke="#334155"/>
  <text x="105" y="645" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#94A3B8">Data Flow</text>
  <line x1="45" y1="665" x2="85" y2="665" stroke="#6B7280" stroke-width="2" class="data-flow"/>
  <text x="95" y="668" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">Real-time</text>
  <circle cx="55" cy="690" r="6" fill="#10B981"/>
  <text x="70" y="693" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">Active Service</text>

  <!-- Version badge -->
  <rect x="1080" y="680" width="80" height="30" rx="15" fill="#334155"/>
  <text x="1120" y="700" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#94A3B8">v1.3.1</text>
</svg>
